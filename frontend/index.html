<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Doc-Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      width: 1.25rem;
      height: 1.25rem;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="max-w-5xl mx-auto px-4 py-10 space-y-8">
    <header class="text-center space-y-2">
      <h1 class="text-3xl font-bold tracking-tight text-slate-900">Ultra Doc-Intelligence</h1>
      <p class="text-slate-600 text-sm">Logistics document Q&A — upload, ask, extract structured fields.</p>
    </header>

    <div id="errorBanner" class="hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-800 text-sm"></div>

    <!-- Panel 1: Upload -->
    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm p-6 space-y-4">
      <h2 class="text-lg font-semibold text-slate-800">1. Upload document</h2>
      <div
        id="dropZone"
        class="border-2 border-dashed border-slate-300 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition"
      >
        <p class="text-slate-600">Drop PDF, DOCX, or TXT here or <span class="text-blue-600 font-medium">click to browse</span></p>
        <p class="text-xs text-slate-400 mt-2">Max 10MB</p>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" class="hidden" />
      </div>
      <div id="fileMeta" class="hidden text-sm text-slate-600"></div>
      <div class="grid gap-3 sm:grid-cols-2">
        <label class="block text-xs font-medium text-slate-600">
          doc_type (metadata)
          <input
            type="text"
            id="docTypeInput"
            value="general"
            placeholder="e.g. shipper_rc, carrier_rc"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
        </label>
        <label class="block text-xs font-medium text-slate-600">
          load_id (optional — defaults to doc_id)
          <input
            type="text"
            id="loadIdInput"
            value=""
            placeholder="Load / PRO number"
            class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
          />
        </label>
      </div>
      <div class="flex items-center gap-3">
        <button
          type="button"
          id="uploadBtn"
          disabled
          class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-600 text-white font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-blue-700"
        >
          <span id="uploadSpinner" class="spinner hidden"></span>
          Upload &amp; index
        </button>
        <span id="uploadStatus" class="text-sm text-emerald-700 font-medium"></span>
      </div>
    </section>

    <!-- Panel 2: Q&A -->
    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm p-6 space-y-4 opacity-60 pointer-events-none" id="panelAsk">
      <h2 class="text-lg font-semibold text-slate-800">2. Ask a question</h2>
      <textarea
        id="question"
        rows="3"
        disabled
        placeholder="e.g. What is the carrier rate?"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-slate-100"
      ></textarea>
      <button
        type="button"
        id="askBtn"
        disabled
        class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800 text-white font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-900"
      >
        <span id="askSpinner" class="spinner hidden"></span>
        Get answer
      </button>

      <div id="answerBlock" class="hidden space-y-4 pt-2">
        <div class="flex flex-wrap items-center gap-2">
          <span id="confBadge" class="text-xs font-semibold px-2 py-1 rounded-full"></span>
        </div>
        <p id="answerText" class="text-xl font-medium text-slate-900 leading-relaxed"></p>
        <div id="guardrailBox" class="hidden rounded-lg border border-amber-300 bg-amber-50 px-4 py-3 text-amber-900 text-sm"></div>
        <details class="group">
          <summary class="cursor-pointer text-sm font-medium text-blue-600 hover:underline">Sources</summary>
          <ul id="sourcesList" class="mt-3 space-y-3 text-sm text-slate-700"></ul>
        </details>
      </div>
    </section>

    <!-- Panel 3: Extraction -->
    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm p-6 space-y-4 opacity-60 pointer-events-none" id="panelExtract">
      <h2 class="text-lg font-semibold text-slate-800">3. Structured extraction</h2>
      <button
        type="button"
        id="extractBtn"
        disabled
        class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-600 text-white font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:bg-emerald-700"
      >
        <span id="extractSpinner" class="spinner hidden"></span>
        Extract shipment data
      </button>
      <div id="extractBlock" class="hidden space-y-3">
        <div class="overflow-x-auto rounded-lg border border-slate-200">
          <table class="min-w-full text-sm">
            <tbody id="extractTable"></tbody>
          </table>
        </div>
        <button
          type="button"
          id="copyJsonBtn"
          class="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-700 text-sm hover:bg-slate-50"
        >
          Copy JSON
        </button>
      </div>
    </section>
  </div>

  <script>
    let docId = null;
    let selectedFile = null;
    let lastExtractJson = null;

    const $ = (id) => document.getElementById(id);
    const errorBanner = $("errorBanner");

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove("hidden");
    }
    function clearError() {
      errorBanner.classList.add("hidden");
      errorBanner.textContent = "";
    }

    /** FastAPI returns { detail: string | ValidationError[] } */
    function formatApiDetail(data, status, fallback) {
      const d = data && data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) {
        return d.map((x) => x.msg || JSON.stringify(x)).join(" ");
      }
      if (d != null && typeof d === "object") return JSON.stringify(d);
      return fallback || `Request failed (${status})`;
    }

    function setPanelsEnabled(on) {
      ["panelAsk", "panelExtract"].forEach((id) => {
        const el = $(id);
        el.classList.toggle("opacity-60", !on);
        el.classList.toggle("pointer-events-none", !on);
      });
      $("question").disabled = !on;
      $("askBtn").disabled = !on;
      $("extractBtn").disabled = !on;
    }

    const dropZone = $("dropZone");
    const fileInput = $("fileInput");

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("border-blue-500", "bg-blue-50");
    });
    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("border-blue-500", "bg-blue-50");
    });
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("border-blue-500", "bg-blue-50");
      if (e.dataTransfer.files.length) pickFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => {
      if (fileInput.files.length) pickFile(fileInput.files[0]);
    });

    function pickFile(file) {
      const ok = /\.(pdf|docx|txt)$/i.test(file.name);
      if (!ok) {
        showError("Please choose a PDF, DOCX, or TXT file.");
        return;
      }
      clearError();
      selectedFile = file;
      $("fileMeta").classList.remove("hidden");
      $("fileMeta").textContent = `${file.name} — ${(file.size / 1024).toFixed(1)} KB`;
      $("uploadBtn").disabled = false;
    }

    $("uploadBtn").addEventListener("click", async () => {
      if (!selectedFile) return;
      clearError();
      const btn = $("uploadBtn");
      const sp = $("uploadSpinner");
      btn.disabled = true;
      sp.classList.remove("hidden");
      const fd = new FormData();
      fd.append("file", selectedFile);
      fd.append("doc_type", ($("docTypeInput").value || "general").trim() || "general");
      fd.append("load_id", ($("loadIdInput").value || "").trim());
      try {
        const res = await fetch("/upload", { method: "POST", body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showError(formatApiDetail(data, res.status, `Upload failed (${res.status})`));
          return;
        }
        docId = data.doc_id;
        $("uploadStatus").textContent = `Indexed ${data.chunk_count} chunks from ${data.filename}`;
        setPanelsEnabled(true);
      } catch (e) {
        showError("Network error during upload.");
      } finally {
        sp.classList.add("hidden");
        btn.disabled = false;
      }
    });

    $("askBtn").addEventListener("click", async () => {
      if (!docId) return;
      clearError();
      const q = $("question").value.trim();
      if (!q) {
        showError("Enter a question.");
        return;
      }
      const btn = $("askBtn");
      const sp = $("askSpinner");
      btn.disabled = true;
      sp.classList.remove("hidden");
      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc_id: docId, question: q }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 429) {
          showError("Groq rate limit hit — wait a few seconds and retry.");
          return;
        }
        if (!res.ok) {
          showError(formatApiDetail(data, res.status, `Ask failed (${res.status})`));
          return;
        }
        renderAsk(data);
      } catch (e) {
        showError("Network error during Q&A.");
      } finally {
        sp.classList.add("hidden");
        btn.disabled = false;
      }
    });

    function renderAsk(data) {
      $("answerBlock").classList.remove("hidden");
      $("answerText").textContent = data.answer;
      const pct = Math.round((data.confidence || 0) * 100);
      const badge = $("confBadge");
      badge.textContent = `${data.confidence_label || "—"} · ${pct}%`;
      badge.className = "text-xs font-semibold px-2 py-1 rounded-full ";
      if (data.confidence_label === "high") badge.className += "bg-emerald-100 text-emerald-800";
      else if (data.confidence_label === "medium") badge.className += "bg-amber-100 text-amber-900";
      else badge.className += "bg-red-100 text-red-800";

      const gb = $("guardrailBox");
      if (data.guardrail_triggered) {
        gb.classList.remove("hidden");
        gb.textContent = data.guardrail_reason
          ? `Guardrail: ${data.guardrail_reason.replace(/_/g, " ")}`
          : "Guardrail triggered — verify against the source document.";
      } else {
        gb.classList.add("hidden");
      }

      const ul = $("sourcesList");
      ul.innerHTML = "";
      (data.sources || []).forEach((s) => {
        const li = document.createElement("li");
        li.className = "border border-slate-100 rounded-lg p-3 bg-slate-50";
        li.innerHTML = `<div class="text-xs text-slate-500 mb-1">Chunk #${s.chunk_index} · similarity ${s.similarity}</div><div class="whitespace-pre-wrap">${escapeHtml(s.text)}</div>`;
        ul.appendChild(li);
      });
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    const extractKeys = [
      ["shipment_id", "Shipment ID"],
      ["shipper", "Shipper"],
      ["consignee", "Consignee"],
      ["pickup_datetime", "Pickup"],
      ["delivery_datetime", "Delivery"],
      ["equipment_type", "Equipment"],
      ["mode", "Mode"],
      ["rate", "Rate"],
      ["currency", "Currency"],
      ["weight", "Weight"],
      ["carrier_name", "Carrier"],
    ];

    $("extractBtn").addEventListener("click", async () => {
      if (!docId) return;
      clearError();
      const btn = $("extractBtn");
      const sp = $("extractSpinner");
      btn.disabled = true;
      sp.classList.remove("hidden");
      try {
        const res = await fetch("/extract", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ doc_id: docId }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 429) {
          showError("Groq rate limit hit — wait a few seconds and retry.");
          return;
        }
        if (!res.ok) {
          showError(formatApiDetail(data, res.status, `Extract failed (${res.status})`));
          return;
        }
        lastExtractJson = JSON.stringify(data, null, 2);
        $("extractBlock").classList.remove("hidden");
        const tb = $("extractTable");
        tb.innerHTML = "";
        extractKeys.forEach(([key, label]) => {
          const tr = document.createElement("tr");
          tr.className = "border-b border-slate-100";
          const val = data[key];
          const display = val === null || val === undefined || val === "" ? "—" : String(val);
          const muted = display === "—";
          tr.innerHTML = `<td class="px-3 py-2 font-medium text-slate-500 w-1/3">${label}</td><td class="px-3 py-2 ${muted ? "text-slate-400" : "text-slate-900"}">${muted ? "—" : escapeHtml(display)}</td>`;
          tb.appendChild(tr);
        });
      } catch (e) {
        showError("Network error during extraction.");
      } finally {
        sp.classList.add("hidden");
        btn.disabled = false;
      }
    });

    $("copyJsonBtn").addEventListener("click", async () => {
      if (!lastExtractJson) return;
      try {
        await navigator.clipboard.writeText(lastExtractJson);
      } catch (e) {
        showError("Could not copy to clipboard.");
      }
    });

    setPanelsEnabled(false);
  </script>
</body>
</html>
